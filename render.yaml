databases:
  - name: glowcart-db
    databaseName: glowcart
    user: glowcart
    plan: free

services:
  - type: web
    name: glow-cart
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn mysite.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: glowcart-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_HOST_USER
        value: glowcart0811@gmail.com
      - key: EMAIL_HOST_PASSWORD
        value: qlgraavwgxxbgyfd
