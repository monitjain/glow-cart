{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Glow Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
</head>
<body>
  <nav class="navbar scrolled">
    <a href="/" class="logo">Glow Cart <span class="logo-star">✦</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/cart/" class="nav-cart">🛒</a>
      <a href="/login/" class="btn-outline-nav">Login</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">✦</div>
      <h2>Create Account</h2>
      <p class="auth-sub">Join Glow Cart for exclusive deals</p>
      {% if error %}<div class="error-msg">⚠ {{ error }}</div>{% endif %}
      <form method="POST" autocomplete="off">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose a username" autocomplete="off" autofocus required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="Enter your email" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-eye">
            <input type="password" name="password" id="pwd1" placeholder="Choose a password" autocomplete="new-password" required>
            <button type="button" class="eye-btn" onclick="togglePwd('pwd1',this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-eye">
            <input type="password" name="password2" id="pwd2" placeholder="Repeat your password" autocomplete="new-password" required>
            <button type="button" class="eye-btn" onclick="togglePwd('pwd2',this)">👁</button>
          </div>
        </div>
        <button type="submit" class="auth-btn">Create Account →</button>
      </form>
      <div class="auth-footer">Already have an account? <a href="/login/">Login</a></div>
    </div>
  </div>
  <script>
    function togglePwd(id, btn) {
      let i = document.getElementById(id);
      i.type = i.type === "password" ? "text" : "password";
      btn.innerText = i.type === "password" ? "👁" : "🙈";
    }
  </script>
</body>
</html>
