{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Glow Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
</head>
<body>

  <nav class="navbar scrolled">
    <a href="/" class="logo">Glow Cart <span class="logo-star">✦</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/cart/" class="nav-cart">🛒</a>
      <a href="/signup/" class="btn-gold-nav">Sign Up</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">✦</div>
      <h2>Welcome Back</h2>
      <p class="auth-sub">Sign in to your Glow Cart account</p>

      {% if form.errors %}
        <div class="error-msg">⚠ Invalid username or password. Please try again.</div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter your username" autofocus required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-eye">
            <input type="password" name="password" id="pwd" placeholder="Enter your password" required>
            <button type="button" class="eye-btn" onclick="togglePwd('pwd', this)">👁</button>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="auth-btn">Login →</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup/">Sign up free</a>
      </div>
    </div>
  </div>

  <script>
    function togglePwd(id, btn) {
      let input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
      btn.innerText = input.type === "password" ? "👁" : "🙈";
    }
  </script>
</body>
</html>
